# electron-builder — Invois (Electron spike)
#
# Two macOS targets matter here:
#   mas      → the real App Store build (needs distribution certs + profile)
#   mas-dev  → a SANDBOXED build signed with a DEVELOPMENT cert + profile.
#              This is the one you run locally to test sandbox behaviour
#              WITHOUT going through App Store review. Tauri has no equivalent —
#              that's why this spike is possible at all.

appId: app.invois
productName: Invois
copyright: © 2026 Arif Riyanto

directories:
  output: dist
  buildResources: build

files:
  - electron/**
  # The built Next.js static export. WITHOUT this the packaged app ships with no
  # UI at all — `app://` would 404 on every request.
  - out/**
  # main.js points the About panel at this one, so it must ship too.
  - build/icon.png
  - package.json

# Chromium ships ~220 locale packs (Tamil, Malayalam, Kannada…) — 47 MB of UI
# strings for an app that speaks two languages. Keep ours, drop the rest.
electronLanguages:
  - en
  - id

mac:
  category: public.app-category.business
  # Reused from the Tauri build (invois-app/src-tauri/icons/icon.icns).
  icon: build/icon.icns
  # A plain (non-store) build — handy to compare size against the MAS one.
  target:
    - dir

# --- App Store build (distribution) ---
mas:
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  hardenedRuntime: false # MAS builds must NOT use hardened runtime
  # Put the App Store provisioning profile here before running `pack:mas`:
  provisioningProfile: build/embedded.provisionprofile

# --- Sandboxed DEV build (what you test with) ---
masDev:
  type: development
  entitlements: build/entitlements.mas.plist
  entitlementsInherit: build/entitlements.mas.inherit.plist
  hardenedRuntime: false
  # Put the DEVELOPMENT provisioning profile here before running `pack:mas-dev`:
  provisioningProfile: build/dev.provisionprofile
